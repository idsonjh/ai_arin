<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060816;
  --t1:#f0f4ff;--t2:#8892b0;--t3:#4a5568;
  --eme:#34d399;--blu:#60a5fa;--vio:#a78bfa;--amb:#fbbf24;--cyn:#22d3ee;--rose:#fb7185;
  --border1:rgba(255,255,255,.08);--border2:rgba(255,255,255,.13);
  --card1:rgba(255,255,255,.04);
  --soft:cubic-bezier(.22,1,.36,1);--spring:cubic-bezier(.17,.84,.44,1.2);
  --em:#34d399;--pnk:#fb7185;
  /* 스케일 팩터: 1920→1440 = 0.75 */
  --s: 0.75;
}

html,body{
  width:100vw;
  height:100vh;
  overflow:hidden;
  background:var(--bg);
  font-family:'Pretendard','Noto Sans KR',sans-serif;
  color:var(--t1);
  word-break:keep-all;
}

/* 전체 씬을 스케일 래퍼로 감싸는 방식 */
#scale-root {
  position:fixed;
  top:0; left:0;
  width:1920px;
  height:1080px;
  transform-origin: top left;
  /* JS에서 동적으로 설정 */
}

.ff{font-family:'Outfit','Pretendard',sans-serif}
.mono{font-family:'JetBrains Mono',monospace}

.bg{position:fixed;inset:0;pointer-events:none;z-index:0}
.bg::before{content:"";position:absolute;inset:0;
  background:radial-gradient(ellipse 900px 600px at 20% 30%,rgba(96,165,250,.07) 0%,transparent 70%),
             radial-gradient(ellipse 700px 500px at 80% 70%,rgba(167,139,250,.07) 0%,transparent 70%)}
.bg::after{content:"";position:absolute;inset:0;
  background-image:linear-gradient(rgba(255,255,255,.025) 1px,transparent 1px),
                   linear-gradient(90deg,rgba(255,255,255,.025) 1px,transparent 1px);
  background-size:60px 60px}

.hud{position:fixed;top:36px;left:56px;right:56px;z-index:100;
  display:flex;align-items:center;justify-content:space-between}
.hud-tag{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--t3)}
.hud-counter{font-family:'JetBrains Mono',monospace;font-size:14px;color:var(--t3);letter-spacing:.08em}
.progress-bar{width:200px;height:2px;background:rgba(255,255,255,.08);border-radius:2px}
.progress-fill{height:100%;background:var(--blu);border-radius:2px;transition:width .4s var(--soft)}

#box{position:relative;z-index:10;width:100%;height:100%;display:flex;align-items:center;justify-content:center}
.sc{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
  opacity:0;transition:opacity .35s ease}
.sc.on{opacity:1}

[data-step]{opacity:0;transform:translateY(24px);
  transition:opacity .5s ease,transform .5s ease;pointer-events:none}
[data-step].show{opacity:1;transform:translateY(0);pointer-events:auto}
[data-shrink]{transition:font-size .5s ease,opacity .4s ease,margin .4s ease}
[data-shrink].shrunk{font-size:24px!important;opacity:.35;margin-bottom:20px!important}

.gl{background:var(--card1);border:1px solid var(--border1);border-radius:18px;backdrop-filter:blur(12px)}
.gb{box-shadow:0 0 48px rgba(96,165,250,.18);border-color:rgba(96,165,250,.3)!important}
.ge{box-shadow:0 0 48px rgba(52,211,153,.18);border-color:rgba(52,211,153,.3)!important}
.gv{box-shadow:0 0 48px rgba(167,139,250,.18);border-color:rgba(167,139,250,.3)!important}
.ga{box-shadow:0 0 48px rgba(251,191,36,.18);border-color:rgba(251,191,36,.3)!important}
.gc{box-shadow:0 0 48px rgba(34,211,238,.18);border-color:rgba(34,211,238,.3)!important}
.gr{box-shadow:0 0 48px rgba(251,113,133,.18);border-color:rgba(251,113,133,.3)!important}

.h1{font-size:72px;font-weight:900;line-height:1.1;word-break:keep-all}
.h2{font-size:48px;font-weight:800;line-height:1.2;word-break:keep-all}
.h3{font-size:32px;font-weight:600;line-height:1.4;word-break:keep-all}
.tag{font-family:'JetBrains Mono',monospace;font-size:13px;font-weight:600;
  letter-spacing:.12em;text-transform:uppercase;color:var(--t3);margin-bottom:18px}
.pill{display:inline-flex;align-items:center;padding:10px 22px;border-radius:40px;
  font-size:18px;font-weight:600;border:1px solid;word-break:keep-all}

.stagger .item{opacity:0;transform:translateY(20px)}
.stagger .item.show{opacity:1;transform:translateY(0);transition:opacity .5s var(--soft),transform .5s var(--soft)}
.stagger.stag .item:nth-child(1){transition-delay:0ms}
.stagger.stag .item:nth-child(2){transition-delay:70ms}
.stagger.stag .item:nth-child(3){transition-delay:140ms}
.stagger.stag .item:nth-child(4){transition-delay:210ms}

.clip-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:28px}
.clip-card{border-radius:18px;padding:40px 36px;
  clip-path:inset(0 100% 0 0);transition:clip-path .9s cubic-bezier(.77,0,.175,1)}
.clip-card.show{clip-path:inset(0 0 0 0)}
.clip-card:nth-child(2){transition-delay:.15s}
.clip-card:nth-child(3){transition-delay:.30s}

.spr-badge{opacity:0;transform:scale(.4);transition:opacity .5s var(--spring),transform .5s var(--spring)}
.spr-badge.show{opacity:1;transform:scale(1)}

.strike-w{position:relative;display:inline-block;transition:color .55s ease .1s}
.strike-w .strike-line{position:absolute;left:-6px;right:-6px;top:52%;
  height:8px;background:linear-gradient(90deg,var(--rose),rgba(251,113,133,.7));
  border-radius:4px;transform:scaleX(0);transform-origin:left center;
  transition:transform .7s cubic-bezier(.25,.8,.3,1) .15s;
  box-shadow:0 0 20px rgba(251,113,133,.6)}
.sc:has([data-step="1"].show) .strike-w .strike-line{transform:scaleX(1)}
.sc:has([data-step="1"].show) .strike-w{color:rgba(255,255,255,.15)}

.bg-num{position:absolute;font-family:'Outfit',sans-serif;font-size:440px;font-weight:900;
  letter-spacing:-.06em;user-select:none;pointer-events:none;line-height:1;
  top:-40px;left:50%;transform:translateX(-50%)}

.grad-e{background:linear-gradient(90deg,#34d399,#22d3ee);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;color:#34d399}
.grad-b{background:linear-gradient(90deg,#60a5fa,#a78bfa);

.grad-v{background:linear-gradient(90deg,#a78bfa,#22d3ee);

.grad-all{background:linear-gradient(90deg,#60a5fa,#a78bfa,#22d3ee);

/* 키보드 힌트 */

.key-badge{

function setScale(){
  const root = document.getElementById('scale-root');
  const scaleX = window.innerWidth / 1920;
  const scaleY = window.innerHeight / 1080;
  const scale = Math.min(scaleX, scaleY);
  root.style.transform = `scale(${scale})`;
  // 중앙 정렬
  const offsetX = (window.innerWidth - 1920 * scale) / 2;
  const offsetY = (window.innerHeight - 1080 * scale) / 2;
  root.style.left = offsetX + 'px';
  root.style.top = offsetY + 'px';
}
setScale();
window.addEventListener('resize', setScale);

const N=scenes.length;
let idx=0;

function updateHUD(){
  hudTag.textContent=TAGS[idx]||'';
  hudIdx.textContent=idx+1;
  progFill.style.width=((idx+1)/N*100)+'%';
}

function render(showAll){
  box.querySelectorAll('.sc').forEach(old=>{old.style.opacity='0';setTimeout(()=>old.remove(),350);});
  const el=document.createElement('div');
  el.className='sc';
  el.innerHTML=scenes[idx].render?scenes[idx].render():scenes[idx]();
  box.appendChild(el);
  el.querySelectorAll('[data-step="0"]').forEach(s=>s.classList.add('show'));
  requestAnimationFrame(()=>el.classList.add('on'));
  if(showAll){
    el.querySelectorAll('[data-step]').forEach(s=>s.classList.add('show'));
    el.querySelectorAll('[data-shrink]').forEach(s=>s.classList.add('shrunk'));
    el.querySelectorAll('.stagger .item').forEach(s=>s.classList.add('show'));
    el.querySelectorAll('.spr-badge').forEach(s=>s.classList.add('show'));
  } else {
    if(scenes[idx].onShow){try{scenes[idx].onShow(el);}catch(e){console.warn(e);}}
  }
  updateHUD();
}

function advance(){
  const el=box.querySelector('.sc');
  if(!el)return;
  const allSteps=[...el.querySelectorAll('[data-step]')];
  const maxStep=allSteps.length?Math.max(...allSteps.map(s=>+s.dataset.step)):0;
  let shown=0;
  for(let i=1;i<=maxStep;i++){
    const s=el.querySelector(`[data-step="${i}"]`);
    if(s&&!s.classList.contains('show')){
      el.querySelectorAll(`[data-shrink="${i}"]`).forEach(x=>x.classList.add('shrunk'));
      s.classList.add('show');
      if(s.classList.contains('stagger')){s.querySelectorAll('.item').forEach(it=>it.classList.add('show'));}
      shown=1;break;
    }
  }
  if(!shown){if(idx<N-1){idx++;render(false);}}
}

function goBack(){if(idx>0){idx--;render(true);}}

document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' ')advance();
  else if(e.key==='ArrowLeft')goBack();
});

// 터치/클릭 지원
let touchStartX=0;
document.addEventListener('touchstart',e=>{touchStartX=e.touches[0].clientX;});
document.addEventListener('touchend',e=>{
  const dx=e.changedTouches[0].clientX-touchStartX;
  if(Math.abs(dx)>40){dx<0?advance():goBack();}
});
document.addEventListener('click',e=>{
  if(e.clientX>window.innerWidth/2)advance();else goBack();
});

render(false);
</script>
